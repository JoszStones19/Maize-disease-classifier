name: maize_doctor
description: AI-powered maize leaf disease classifier for farmers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.2.7
  dio: ^5.7.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  dotted_border: ^2.1.0
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true